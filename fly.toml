app = "rawtalent-knowledgebase"
primary_region = "syd"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
