<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — RawTalent Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="/">
      <span class="nav-logo">Raw<span>Talent</span></span>
      <span class="nav-tag">Knowledge Base</span>
    </a>
    <div class="nav-actions">
      <div class="nav-user">
        <div class="nav-avatar" id="navAvatar">?</div>
      </div>
      <button class="nav-btn ghost" onclick="logout()">Sign Out</button>
      <button class="nav-btn admin-btn" id="adminNavBtn" onclick="location.href='/admin'" style="display:none">
        ⚙ Admin
      </button>
    </div>
  </nav>

  <div id="pageContent">
    <div class="loading-spinner" style="padding-top:80px">
      <div class="spinner"></div>
      Loading article…
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>

  <script>
    const articleId = new URLSearchParams(location.search).get('id');
    if (!articleId) location.href = '/';

    let glossaryTerms = [];

    async function init() {
      try {
        const me = await fetch('/auth/me').then(r => r.json());
        if (me.error) { location.href = '/login.html'; return; }
        document.getElementById('navAvatar').textContent = (me.name || me.email)[0].toUpperCase();
        if (me.role === 'admin') document.getElementById('adminNavBtn').style.display = 'inline-flex';
      } catch { location.href = '/login.html'; return; }

      // Load glossary and article in parallel
      const [glossaryRes] = await Promise.all([
        fetch('/api/articles/glossary').then(r => r.json()).catch(() => []),
        loadArticle()
      ]);
      glossaryTerms = glossaryRes;
    }

    async function loadArticle() {
      try {
        const res = await fetch(`/api/articles/${articleId}`);
        if (res.status === 404) {
          document.getElementById('pageContent').innerHTML = `
            <div class="error-page">
              <div class="error-code">404</div>
              <div class="error-title">Article not found</div>
              <p class="error-sub">This article may have been moved or deleted.</p>
              <br><a href="/" style="color:var(--orange);font-weight:600">← Back to Knowledge Base</a>
            </div>`;
          return;
        }
        const article = await res.json();
        document.title = `${article.title} — RawTalent Knowledge Base`;
        renderArticle(article);
      } catch {
        document.getElementById('pageContent').innerHTML = `
          <div class="empty-state"><div class="empty-icon">⚠️</div>
          <div class="empty-title">Failed to load article</div>
          <p>Please refresh and try again.</p></div>`;
      }
    }

    function renderArticle(a) {
      const safeHtml = DOMPurify.sanitize(a.content || '', { ADD_TAGS: ['table','thead','tbody','tr','th','td'] });

      const updatedDate = fmtDate(a.updated_at);
      const createdDate = fmtDate(a.created_at);

      const tagsHtml = (a.tags || []).length > 0
        ? `<div class="article-tags-row">${a.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>`
        : '';

      const relatedHtml = (a.relatedArticles || []).length > 0 ? `
        <div class="related-articles-section">
          <div class="related-articles-heading">You might also find helpful</div>
          <div class="related-articles-grid">
            ${a.relatedArticles.map(r => `
              <a class="related-article-card" href="/article?id=${r.id}">
                ${r.category ? `<div class="related-article-cat">${escHtml(r.category)}</div>` : ''}
                <div class="related-article-title">${escHtml(r.title)}</div>
                ${r.summary ? `<div class="related-article-summary">${escHtml(r.summary)}</div>` : ''}
              </a>
            `).join('')}
          </div>
        </div>
      ` : '';

      document.getElementById('pageContent').innerHTML = `
        <div class="article-layout">
          <div>
            <a class="article-back" href="/">← Back to Search</a>
            <div class="article-main-card">
              ${a.category ? `<div class="article-category-badge">${escHtml(a.category)}</div>` : ''}
              <h1 class="article-title">${escHtml(a.title)}</h1>
              <div class="article-meta-row">
                ${a.author_name ? `<span class="article-meta-item">✍ ${escHtml(a.author_name)}</span>` : ''}
                <span class="article-meta-item">📅 Updated ${updatedDate}</span>
                ${createdDate !== updatedDate ? `<span class="article-meta-item" style="color:var(--gray-400)">Created ${createdDate}</span>` : ''}
              </div>
              ${tagsHtml}
              <div class="ql-snow" style="border:none">
                <div class="article-content ql-editor" id="articleBody" style="padding:0;font-size:16px;line-height:1.9;font-family:'Plus Jakarta Sans',sans-serif">${safeHtml}</div>
              </div>
              ${relatedHtml}
            </div>
          </div>

          <div class="article-sidebar">
            <div class="sidebar-card">
              <div class="sidebar-heading">In This Article</div>
              <div id="tocContent" style="font-size:13px;color:var(--text-muted)">Loading…</div>
            </div>
            <div class="sidebar-card" id="glossarySidebarCard" style="display:none">
              <div class="sidebar-heading">Terms in This Article</div>
              <div id="glossarySidebarList"></div>
            </div>
            ${(a.relatedArticles || []).length > 0 ? `
            <div class="sidebar-card">
              <div class="sidebar-heading">Related Articles</div>
              <div id="relatedSidebarList">
                ${a.relatedArticles.map(r => `
                  <a href="/article?id=${r.id}" style="display:block;padding:8px 0;border-bottom:1px solid var(--gray-100);text-decoration:none;transition:color .15s"
                    onmouseover="this.style.color='var(--orange)'" onmouseout="this.style.color=''">
                    ${r.category ? `<div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--orange);margin-bottom:2px">${escHtml(r.category)}</div>` : ''}
                    <div style="font-size:13px;font-weight:600;color:var(--navy);line-height:1.4">${escHtml(r.title)}</div>
                  </a>
                `).join('')}
              </div>
            </div>` : ''}
          </div>
        </div>
      `;

      buildToc();
      // Apply glossary after DOM is ready
      setTimeout(() => applyGlossary(), 50);
    }

    function applyGlossary() {
      if (!glossaryTerms.length) return;

      const body = document.getElementById('articleBody');
      if (!body) return;

      // Sort longest terms first to avoid partial matches
      const sorted = [...glossaryTerms].sort((a, b) => b.term.length - a.term.length);
      const foundTerms = [];

      // Walk text nodes only — never touch HTML tags
      function walkTextNodes(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          let text = node.textContent;
          let replaced = false;
          let result = text;

          for (const { term, definition } of sorted) {
            const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`\\b(${escaped})\\b`, 'gi');
            if (regex.test(result)) {
              result = result.replace(regex, (match) => {
                replaced = true;
                if (!foundTerms.find(t => t.term.toLowerCase() === term.toLowerCase())) {
                  foundTerms.push({ term, definition });
                }
                return `<span class="glossary-term">${match}<span class="glossary-tip">${escHtml(definition)}</span></span>`;
              });
            }
          }

          if (replaced) {
            const span = document.createElement('span');
            span.innerHTML = result;
            node.parentNode.replaceChild(span, node);
          }
        } else if (
          node.nodeType === Node.ELEMENT_NODE &&
          !['A', 'CODE', 'PRE', 'SCRIPT', 'STYLE'].includes(node.tagName)
        ) {
          Array.from(node.childNodes).forEach(walkTextNodes);
        }
      }

      walkTextNodes(body);

      // Show sidebar glossary card if terms were found
      if (foundTerms.length > 0) {
        const card = document.getElementById('glossarySidebarCard');
        const list = document.getElementById('glossarySidebarList');
        card.style.display = 'block';
        list.innerHTML = foundTerms.map(t => `
          <div style="padding:8px 0;border-bottom:1px solid var(--gray-100)">
            <div style="font-weight:700;font-size:13px;color:var(--orange)">${escHtml(t.term)}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px;line-height:1.5">${escHtml(t.definition)}</div>
          </div>
        `).join('');
        // Remove border from last item
        const items = list.querySelectorAll('div');
        if (items.length) items[items.length-1].style.borderBottom = 'none';
      }
    }

    function buildToc() {
      const headings = document.querySelectorAll('.article-content h1, .article-content h2, .article-content h3');
      const toc = document.getElementById('tocContent');
      if (headings.length === 0) { toc.textContent = 'No sections'; return; }
      const items = Array.from(headings).map((h, i) => {
        const anchor = `section-${i}`;
        h.id = anchor;
        const indent = h.tagName === 'H3' ? 12 : 0;
        return `<a href="#${anchor}" style="display:block;padding:4px 0 4px ${indent + 10}px;color:var(--text-muted);text-decoration:none;font-size:13px;line-height:1.4;border-left:2px solid transparent;transition:all 0.15s"
          onmouseover="this.style.color='var(--orange)';this.style.borderLeftColor='var(--orange)'"
          onmouseout="this.style.color='var(--text-muted)';this.style.borderLeftColor='transparent'"
        >${escHtml(h.textContent)}</a>`;
      });
      toc.innerHTML = items.join('');
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      location.href = '/login.html';
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtDate(iso) {
      if (!iso) return '';
      try { return new Date(iso).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }); }
      catch { return ''; }
    }

    init();
  </script>
</body>
</html>
