<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — RawTalent Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Individual card collapse ───────────────────────────── */
    .sidebar-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      margin-bottom: 0;
    }
    .sidebar-card-header .sidebar-heading { margin-bottom: 0; }
    .sidebar-toggle {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: none;
      background: var(--gray-100);
      color: var(--gray-400);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .sidebar-toggle:hover { background: var(--orange-glow); color: var(--orange); }
    .sidebar-card-body {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.25s ease;
      max-height: 600px;
      opacity: 1;
      margin-top: 14px;
    }
    .sidebar-card-body.collapsed { max-height: 0; opacity: 0; margin-top: 0; }

    /* ── Full-pane hide/show ────────────────────────────────── */
    .article-layout.panel-hidden { grid-template-columns: 1fr !important; }
    #articleSidebar.panel-hidden { display: none !important; }

    #sidebarRevealBtn {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: var(--navy);
      color: var(--gray-400);
      border: none;
      border-radius: 8px 0 0 8px;
      padding: 14px 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      writing-mode: vertical-rl;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      z-index: 50;
      display: none;
      box-shadow: -2px 0 12px rgba(0,0,0,.15);
      transition: color 0.15s;
    }
    #sidebarRevealBtn:hover { color: white; }

    .sidebar-hide-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }
    .sidebar-hide-btn {
      background: none;
      border: none;
      color: var(--gray-400);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .sidebar-hide-btn:hover { color: var(--navy); background: var(--gray-100); }

    /* ── Feedback card ──────────────────────────────────────── */
    .feedback-btn {
      width: 100%;
      padding: 10px 14px;
      background: var(--orange-glow);
      border: 1px solid rgba(61,111,255,.2);
      border-radius: var(--radius);
      color: var(--orange);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      text-align: center;
    }
    .feedback-btn:hover { background: rgba(61,111,255,.18); box-shadow: 0 2px 8px rgba(61,111,255,.15); }

    /* ── Direct content styles (no Quill wrapper) ───────────── */
    .article-content ol { list-style-type: decimal; }
    .article-content ul { list-style-type: disc; }
    .article-content ol ol, .article-content ul ul { list-style-type: revert; margin-bottom: 0; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="/">
      <img src="/images/logo.svg" alt="RawTalent" height="28" style="display:block">
      <span class="nav-tag">Knowledge Base</span>
    </a>
    <div class="nav-actions">
      <div class="nav-user" style="cursor:pointer" onclick="openPasswordModal()" title="Change your password">
        <div class="nav-avatar" id="navAvatar">?</div>
      </div>
      <button class="nav-btn ghost" onclick="openPasswordModal()" style="font-size:12px;padding:6px 12px">⚙ Settings</button>
      <button class="nav-btn ghost" onclick="logout()">Sign Out</button>
      <button class="nav-btn admin-btn" id="adminNavBtn" onclick="location.href='/admin'" style="display:none">
        ⚙ Admin
      </button>
    </div>
  </nav>

  <div id="pageContent">
    <div class="loading-spinner" style="padding-top:80px">
      <div class="spinner"></div>
      Loading article…
    </div>
  </div>

  <!-- Floating reveal button (shown when panel is hidden) -->
  <button id="sidebarRevealBtn" onclick="toggleSidebarPanel()">Panel ›</button>

  <!-- Feedback Modal -->
  <div class="modal-overlay" id="feedbackModal" onclick="if(event.target===this)closeFeedbackModal()">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <div class="modal-title">Suggest a Change</div>
        <button class="modal-close" onclick="closeFeedbackModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group-modal">
          <label class="form-label-modal">Article</label>
          <input type="text" id="feedbackArticleTitle" class="form-control" readonly style="background:var(--gray-100);color:var(--text-muted)">
        </div>
        <div class="form-group-modal" style="margin-top:14px">
          <label class="form-label-modal">What should be changed? <span style="color:#ef4444">*</span></label>
          <textarea id="feedbackContent" class="form-control" style="min-height:130px;resize:vertical;margin-top:0" placeholder="Describe what is incorrect, outdated, or missing in this article…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeFeedbackModal()">Cancel</button>
        <button class="btn-add" onclick="submitFeedback()">Submit Feedback</button>
      </div>
    </div>
  </div>

  <!-- Password Change Modal -->
  <div class="modal-overlay" id="passwordModal" onclick="if(event.target===this)closePasswordModal()">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <div class="modal-title">Change Password</div>
        <button class="modal-close" onclick="closePasswordModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="passwordModalError" style="display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:var(--radius);padding:10px 14px;color:#dc2626;font-size:13px;margin-bottom:14px"></div>
        <div class="form-group-modal">
          <label class="form-label-modal">Current Password</label>
          <input type="password" id="currentPassword" class="form-control" placeholder="Your current password" autocomplete="current-password">
        </div>
        <div class="form-group-modal" style="margin-top:14px">
          <label class="form-label-modal">New Password</label>
          <input type="password" id="newPassword" class="form-control" placeholder="At least 8 characters" autocomplete="new-password">
        </div>
        <div class="form-group-modal" style="margin-top:14px">
          <label class="form-label-modal">Confirm New Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat new password" autocomplete="new-password">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closePasswordModal()">Cancel</button>
        <button class="btn-add" onclick="changePassword()">Update Password</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>

  <script>
    const articleId = new URLSearchParams(location.search).get('id');
    if (!articleId) location.href = '/';

    let glossaryTerms = [];
    let currentArticleTitle = '';

    async function init() {
      try {
        const me = await fetch('/auth/me').then(r => r.json());
        if (me.error) { location.href = '/login.html'; return; }
        document.getElementById('navAvatar').textContent = (me.name || me.email)[0].toUpperCase();
        if (me.role === 'admin') document.getElementById('adminNavBtn').style.display = 'inline-flex';
      } catch { location.href = '/login.html'; return; }

      const [glossaryRes] = await Promise.all([
        fetch('/api/articles/glossary').then(r => r.json()).catch(() => []),
        loadArticle()
      ]);
      glossaryTerms = glossaryRes;
    }

    async function loadArticle() {
      try {
        const res = await fetch(`/api/articles/${articleId}`);
        if (res.status === 404) {
          document.getElementById('pageContent').innerHTML = `
            <div class="error-page">
              <div class="error-code">404</div>
              <div class="error-title">Article not found</div>
              <p class="error-sub">This article may have been moved or deleted.</p>
              <br><a href="/" style="color:var(--orange);font-weight:600">← Back to Knowledge Base</a>
            </div>`;
          return;
        }
        const article = await res.json();
        currentArticleTitle = article.title;
        document.title = `${article.title} — RawTalent Knowledge Base`;

        const files = await fetch(`/api/articles/${articleId}/files`).then(r => r.json()).catch(() => []);
        renderArticle(article, files);
      } catch {
        document.getElementById('pageContent').innerHTML = `
          <div class="empty-state"><div class="empty-icon">⚠️</div>
          <div class="empty-title">Failed to load article</div>
          <p>Please refresh and try again.</p></div>`;
      }
    }

    function renderArticle(a, files = []) {
      const safeHtml = DOMPurify.sanitize(a.content || '', {
        ADD_TAGS: ['table','thead','tbody','tr','th','td'],
        FORCE_BODY: false
      });

      const updatedDate = fmtDate(a.updated_at);
      const createdDate = fmtDate(a.created_at);

      const tagsHtml = (a.tags || []).length > 0
        ? `<div class="article-tags-row">${a.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>`
        : '';

      // File attachments
      const inlineFiles = (files || []).filter(f => f.display_mode === 'inline');
      const downloadFiles = (files || []).filter(f => f.display_mode === 'download');

      const inlineHtml = inlineFiles.length > 0 ? inlineFiles.map(f => {
        const url = `/api/articles/file/${f.id}`;
        if (f.mimetype.startsWith('image/')) {
          return `<div style="margin:24px 0"><img src="${url}" alt="${escHtml(f.filename)}" style="max-width:100%;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08)"></div>`;
        } else if (f.mimetype === 'application/pdf') {
          return `<div style="margin:24px 0"><iframe src="${url}" style="width:100%;height:600px;border:1px solid var(--gray-200);border-radius:8px" title="${escHtml(f.filename)}"></iframe></div>`;
        }
        return '';
      }).join('') : '';

      const downloadsHtml = downloadFiles.length > 0 ? `
        <div style="margin:32px 0;padding:20px 24px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px">
          <div style="font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px">Attachments</div>
          ${downloadFiles.map(f => `
            <a href="/api/articles/file/${f.id}" download="${escHtml(f.filename)}"
              style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:white;border:1px solid var(--gray-200);border-radius:8px;text-decoration:none;color:var(--navy);font-weight:600;font-size:13px;margin-bottom:8px;transition:box-shadow .15s"
              onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,.08)'" onmouseout="this.style.boxShadow=''">
              <span style="font-size:20px">${fileIcon(f.mimetype)}</span>
              <div style="min-width:0">
                <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(f.filename)}</div>
                <div style="font-size:11px;font-weight:400;color:var(--text-muted);margin-top:1px">${f.mimetype}</div>
              </div>
              <span style="margin-left:auto;font-size:12px;color:var(--text-muted);flex-shrink:0">⬇ Download</span>
            </a>
          `).join('')}
        </div>
      ` : '';

      const relatedHtml = (a.relatedArticles || []).length > 0 ? `
        <div class="related-articles-section">
          <div class="related-articles-heading">You might also find helpful</div>
          <div class="related-articles-grid">
            ${a.relatedArticles.map(r => `
              <a class="related-article-card" href="/article?id=${r.id}">
                ${r.category ? `<div class="related-article-cat">${escHtml(r.category)}</div>` : ''}
                <div class="related-article-title">${escHtml(r.title)}</div>
                ${r.summary ? `<div class="related-article-summary">${escHtml(r.summary)}</div>` : ''}
              </a>
            `).join('')}
          </div>
        </div>
      ` : '';

      const relatedSidebarHtml = (a.relatedArticles || []).length > 0 ? `
        <div class="sidebar-card">
          <div class="sidebar-card-header" onclick="toggleSidebar(this)" title="Click to collapse">
            <div class="sidebar-heading">Related Articles</div>
            <button class="sidebar-toggle" tabindex="-1">−</button>
          </div>
          <div class="sidebar-card-body">
            ${a.relatedArticles.map(r => `
              <a href="/article?id=${r.id}" style="display:block;padding:8px 0;border-bottom:1px solid var(--gray-100);text-decoration:none;transition:color .15s"
                onmouseover="this.style.color='var(--orange)'" onmouseout="this.style.color=''">
                ${r.category ? `<div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--orange);margin-bottom:2px">${escHtml(r.category)}</div>` : ''}
                <div style="font-size:13px;font-weight:600;color:var(--navy);line-height:1.4">${escHtml(r.title)}</div>
              </a>
            `).join('')}
          </div>
        </div>
      ` : '';

      document.getElementById('pageContent').innerHTML = `
        <div class="article-layout" id="articleLayout">
          <div>
            <a class="article-back" href="/">← Back to Search</a>
            <div class="article-main-card">
              ${a.category ? `<div class="article-category-badge">${escHtml(a.category)}</div>` : ''}
              <h1 class="article-title">${escHtml(a.title)}</h1>
              <div class="article-meta-row">
                ${a.author_name ? `<span class="article-meta-item">✍ ${escHtml(a.author_name)}</span>` : ''}
                <span class="article-meta-item">📅 Updated ${updatedDate}</span>
                ${createdDate !== updatedDate ? `<span class="article-meta-item" style="color:var(--gray-400)">Created ${createdDate}</span>` : ''}
              </div>
              ${tagsHtml}
              <div class="article-content" id="articleBody" style="font-size:16px;line-height:1.9;font-family:'Plus Jakarta Sans',sans-serif">${safeHtml}</div>
              ${inlineHtml}
              ${downloadsHtml}
              ${relatedHtml}
            </div>
          </div>

          <div class="article-sidebar" id="articleSidebar">
            <div class="sidebar-hide-row">
              <button class="sidebar-hide-btn" onclick="toggleSidebarPanel()" title="Hide this panel">Hide panel ›</button>
            </div>

            <div class="sidebar-card">
              <div class="sidebar-card-header" onclick="toggleSidebar(this)" title="Click to collapse">
                <div class="sidebar-heading">In This Article</div>
                <button class="sidebar-toggle" tabindex="-1">−</button>
              </div>
              <div class="sidebar-card-body">
                <div id="tocContent" style="font-size:13px;color:var(--text-muted)">Loading…</div>
              </div>
            </div>

            <div class="sidebar-card" id="glossarySidebarCard" style="display:none">
              <div class="sidebar-card-header" onclick="toggleSidebar(this)" title="Click to collapse">
                <div class="sidebar-heading">Terms in This Article</div>
                <button class="sidebar-toggle" tabindex="-1">−</button>
              </div>
              <div class="sidebar-card-body">
                <div id="glossarySidebarList"></div>
              </div>
            </div>

            ${relatedSidebarHtml}

            <div class="sidebar-card" style="padding:16px 22px">
              <button class="feedback-btn" onclick="openFeedbackModal()">💬 Provide Feedback on this Article</button>
            </div>
          </div>
        </div>
      `;

      buildToc();
      setTimeout(() => applyGlossary(), 50);
    }

    // ── Full sidebar panel toggle ──────────────────────────────────
    function toggleSidebarPanel() {
      const sidebar = document.getElementById('articleSidebar');
      const layout = document.getElementById('articleLayout');
      const revealBtn = document.getElementById('sidebarRevealBtn');
      const isHidden = sidebar.classList.toggle('panel-hidden');
      layout.classList.toggle('panel-hidden', isHidden);
      revealBtn.style.display = isHidden ? 'block' : 'none';
    }

    // ── Individual card collapse ───────────────────────────────────
    function toggleSidebar(header) {
      const body = header.nextElementSibling;
      const btn = header.querySelector('.sidebar-toggle');
      const isCollapsed = body.classList.toggle('collapsed');
      btn.textContent = isCollapsed ? '+' : '−';
      header.title = isCollapsed ? 'Click to expand' : 'Click to collapse';
    }

    // ── Feedback ───────────────────────────────────────────────────
    function openFeedbackModal() {
      document.getElementById('feedbackArticleTitle').value = currentArticleTitle;
      document.getElementById('feedbackContent').value = '';
      document.getElementById('feedbackModal').classList.add('open');
    }
    function closeFeedbackModal() {
      document.getElementById('feedbackModal').classList.remove('open');
    }
    async function submitFeedback() {
      const suggestedChanges = document.getElementById('feedbackContent').value.trim();
      if (!suggestedChanges) { toast('Please describe what should be changed', 'error'); return; }
      try {
        const res = await fetch(`/api/articles/${articleId}/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ suggestedChanges })
        });
        const data = await res.json();
        if (!res.ok) { toast(data.error || 'Submit failed', 'error'); return; }
        closeFeedbackModal();
        toast('Feedback submitted — thank you!', 'success');
      } catch { toast('Network error', 'error'); }
    }

    // ── Password Change ────────────────────────────────────────────
    function openPasswordModal() {
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      document.getElementById('passwordModalError').style.display = 'none';
      document.getElementById('passwordModal').classList.add('open');
    }
    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('open');
    }
    async function changePassword() {
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errEl = document.getElementById('passwordModalError');

      const showErr = (msg) => { errEl.textContent = msg; errEl.style.display = 'block'; };
      errEl.style.display = 'none';

      if (!currentPassword || !newPassword || !confirmPassword) { showErr('All fields are required'); return; }
      if (newPassword.length < 8) { showErr('New password must be at least 8 characters'); return; }
      if (newPassword !== confirmPassword) { showErr('New passwords do not match'); return; }

      try {
        const res = await fetch('/auth/change-password', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword, newPassword })
        });
        const data = await res.json();
        if (!res.ok) { showErr(data.error || 'Failed to update password'); return; }
        closePasswordModal();
        toast('Password updated successfully', 'success');
      } catch { showErr('Network error'); }
    }

    // ── Glossary ───────────────────────────────────────────────────
    function applyGlossary() {
      if (!glossaryTerms.length) return;
      const body = document.getElementById('articleBody');
      if (!body) return;

      const sorted = [...glossaryTerms].sort((a, b) => b.term.length - a.term.length);
      const foundTerms = [];
      const alreadyHighlighted = new Set();

      function walkTextNodes(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent;

          // Find the leftmost matching term not yet highlighted
          let firstMatch = null;
          let firstIndex = Infinity;
          for (const { term, definition } of sorted) {
            if (alreadyHighlighted.has(term.toLowerCase())) continue;
            const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const m = new RegExp(`\\b(${escaped})\\b`, 'i').exec(text);
            if (m && m.index < firstIndex) {
              firstIndex = m.index;
              firstMatch = { term, definition, match: m };
            }
          }
          if (!firstMatch) return;

          const { term, definition, match } = firstMatch;
          alreadyHighlighted.add(term.toLowerCase());
          foundTerms.push({ term, definition });

          // Build DOM nodes — textContent for the tip prevents any nested highlighting
          const parent = node.parentNode;
          const termSpan = document.createElement('span');
          termSpan.className = 'glossary-term';
          termSpan.appendChild(document.createTextNode(match[0]));
          const tip = document.createElement('span');
          tip.className = 'glossary-tip';
          tip.textContent = definition;
          termSpan.appendChild(tip);

          if (firstIndex > 0) parent.insertBefore(document.createTextNode(text.slice(0, firstIndex)), node);
          parent.insertBefore(termSpan, node);
          const afterText = text.slice(firstIndex + match[0].length);
          if (afterText) {
            const afterNode = document.createTextNode(afterText);
            parent.insertBefore(afterNode, node);
            parent.removeChild(node);
            walkTextNodes(afterNode); // keep looking for terms in the remainder
          } else {
            parent.removeChild(node);
          }

        } else if (
          node.nodeType === Node.ELEMENT_NODE &&
          !node.classList.contains('glossary-tip') && // never walk inside a tooltip
          !['A', 'CODE', 'PRE', 'SCRIPT', 'STYLE'].includes(node.tagName)
        ) {
          Array.from(node.childNodes).forEach(walkTextNodes);
        }
      }

      walkTextNodes(body);

      if (foundTerms.length > 0) {
        const card = document.getElementById('glossarySidebarCard');
        const list = document.getElementById('glossarySidebarList');
        card.style.display = 'block';
        list.innerHTML = foundTerms.map((t, i) => `
          <div style="padding:8px 0;${i < foundTerms.length - 1 ? 'border-bottom:1px solid var(--gray-100)' : ''}">
            <div style="font-weight:700;font-size:13px;color:var(--orange)">${escHtml(t.term)}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px;line-height:1.5">${escHtml(t.definition)}</div>
          </div>
        `).join('');
      }
    }

    // ── TOC ────────────────────────────────────────────────────────
    function buildToc() {
      const headings = document.querySelectorAll('.article-content h1, .article-content h2, .article-content h3');
      const toc = document.getElementById('tocContent');
      if (headings.length === 0) { toc.textContent = 'No sections'; return; }
      const items = Array.from(headings).map((h, i) => {
        const anchor = `section-${i}`;
        h.id = anchor;
        const indent = h.tagName === 'H3' ? 12 : 0;
        return `<a href="#${anchor}" style="display:block;padding:4px 0 4px ${indent + 10}px;color:var(--text-muted);text-decoration:none;font-size:13px;line-height:1.4;border-left:2px solid transparent;transition:all 0.15s"
          onmouseover="this.style.color='var(--orange)';this.style.borderLeftColor='var(--orange)'"
          onmouseout="this.style.color='var(--text-muted)';this.style.borderLeftColor='transparent'"
        >${escHtml(h.textContent)}</a>`;
      });
      toc.innerHTML = items.join('');
    }

    // ── Misc ───────────────────────────────────────────────────────
    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      location.href = '/login.html';
    }

    function toast(msg, type = '') {
      const tc = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      tc.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    function fileIcon(mime) {
      if (mime.startsWith('image/')) return '🖼';
      if (mime === 'application/pdf') return '📄';
      if (mime.includes('word') || mime.includes('document')) return '📝';
      if (mime.includes('sheet') || mime.includes('excel') || mime.includes('csv')) return '📊';
      if (mime.includes('presentation') || mime.includes('powerpoint')) return '📑';
      if (mime.includes('zip') || mime.includes('compressed')) return '🗜';
      return '📎';
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtDate(iso) {
      if (!iso) return '';
      try { return new Date(iso).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' }); }
      catch { return ''; }
    }

    init();
  </script>
</body>
</html>
