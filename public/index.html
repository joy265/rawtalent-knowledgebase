<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RawTalent Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .hero-wrap {
      background: var(--navy);
      padding: 52px 24px 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 0%, rgba(61,111,255,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 100%, rgba(61,111,255,.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-content { position: relative; z-index: 2; }
    .hero-title {
      font-size: 36px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.8px;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .hero-title span { color: var(--orange); }
    .hero-sub {
      font-size: 15px;
      color: rgba(255,255,255,.5);
      margin-bottom: 28px;
    }

    /* Mode tabs */
    .mode-tabs {
      display: inline-flex;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 4px;
      gap: 2px;
      margin-bottom: 20px;
      position: relative;
      z-index: 10;
    }
    .mode-tab {
      padding: 8px 22px;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.55);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      z-index: 2;
    }
    .mode-tab.active {
      background: white;
      color: var(--navy);
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .mode-tab:not(.active):hover { color: white; }

    /* Search input */
    .hero-search-wrap {
      max-width: 660px;
      margin: 0 auto 0;
      position: relative;
      z-index: 10;
    }
    .hero-input {
      width: 100%;
      padding: 16px 56px 16px 22px;
      background: white;
      border: 2px solid transparent;
      border-radius: 50px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      box-shadow: 0 4px 32px rgba(0,0,0,.2);
      transition: border-color .2s, box-shadow .2s;
    }
    .hero-input:focus { border-color: var(--orange); box-shadow: 0 4px 32px rgba(0,0,0,.2), 0 0 0 4px rgba(61,111,255,.15); }
    .hero-input::placeholder { color: #9ca3af; }
    .hero-input-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--gray-400);
      pointer-events: none;
    }

    /* AI ask button */
    .hero-ask-row {
      display: flex;
      gap: 10px;
      max-width: 660px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }
    .hero-ask-btn {
      flex-shrink: 0;
      padding: 0 26px;
      height: 52px;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 16px rgba(61,111,255,.35);
    }
    .hero-ask-btn:hover { background: var(--orange-light); transform: translateY(-1px); }
    .hero-ask-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    /* AI mode banner */
    .ai-mode-banner {
      background: linear-gradient(135deg, rgba(61,111,255,.15) 0%, rgba(92,134,255,.08) 100%);
      border-top: 1px solid rgba(61,111,255,.2);
      padding: 10px 24px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,.55);
      display: none;
    }
    .ai-mode-banner.show { display: block; }

    /* Stats strip */
    .stats-strip {
      background: var(--navy);
      border-top: 1px solid rgba(255,255,255,.06);
      padding: 16px 32px;
      display: flex;
      justify-content: center;
      gap: 40px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(255,255,255,.45);
    }
    .stat-pill strong { color: rgba(255,255,255,.8); font-weight: 700; }

    /* Category bar */
    .cat-bar {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 32px;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .cat-bar::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all .15s;
      white-space: nowrap;
    }
    .cat-pill:hover { color: var(--navy); }
    .cat-pill.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* Results */
    .results-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }
    .results-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }
    .results-grid {
      display: grid;
      gap: 12px;
    }

    /* Article card */
    .article-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 22px 26px;
      text-decoration: none;
      display: block;
      transition: all .18s;
      position: relative;
    }
    .article-card:hover {
      border-color: var(--orange);
      box-shadow: 0 4px 20px rgba(61,111,255,.1);
      transform: translateY(-1px);
    }
    .article-card::after {
      content: '→';
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 16px;
      opacity: 0;
      transition: opacity .15s, right .15s;
    }
    .article-card:hover::after { opacity: 1; right: 20px; }
    .card-cat {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 6px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .card-summary {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .card-tag {
      padding: 2px 10px;
      background: var(--gray-100);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-600);
    }
    .card-date { font-size: 12px; color: var(--gray-400); flex-shrink: 0; }

    /* AI answer */
    .ai-answer-wrap {
      background: white;
      border: 1.5px solid rgba(61,111,255,.25);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(61,111,255,.08);
      margin-bottom: 20px;
    }
    .ai-answer-header {
      background: linear-gradient(135deg, rgba(61,111,255,.08) 0%, rgba(92,134,255,.04) 100%);
      border-bottom: 1px solid rgba(61,111,255,.12);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--orange);
    }
    .ai-answer-body { padding: 24px; }
    .ai-answer-text {
      font-size: 15px;
      line-height: 1.85;
      color: var(--text);
      white-space: pre-wrap;
    }
    .ai-sources-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 20px 0 10px;
    }
    .ai-source-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      margin: 0 6px 6px 0;
      text-decoration: none;
      transition: all .15s;
    }
    .ai-source-tag:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-glow); }
    .source-ref {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 4px;
      background: var(--orange);
      color: white;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      text-decoration: none;
      vertical-align: super;
      line-height: 1;
      transition: all .15s;
      margin: 0 1px;
    }
    .source-ref:hover { filter: brightness(1.15); transform: scale(1.1); }
    .ai-answer-text { font-size: 15px; line-height: 1.85; color: var(--text); }
    .ai-answer-text p { margin: 0 0 14px; }
    .ai-answer-text p:last-child { margin-bottom: 0; }
    .ai-answer-text strong { color: var(--navy); }
    .ai-answer-text ul, .ai-answer-text ol { margin: 8px 0 14px 22px; }
    .ai-answer-text li { margin-bottom: 6px; }
    .ai-disclaimer {
      margin-top: 18px;
      padding: 10px 14px;
      background: var(--gray-100);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Empty / loading */
    .empty-wrap {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 14px; }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    .spinner-wrap { display: flex; justify-content: center; padding: 60px; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="/">
      <img src="/images/logo.svg" alt="RawTalent" height="28" style="display:block">
      <span class="nav-tag">Knowledge Base</span>
    </a>
    <div class="nav-actions">
      <div class="nav-user">
        <div class="nav-avatar" id="navAvatar">?</div>
        <span id="navName" style="font-size:13px;color:rgba(255,255,255,.5);display:none"></span>
      </div>
      <button class="nav-btn ghost" onclick="logout()">Sign Out</button>
      <button class="nav-btn admin-btn" id="adminNavBtn" onclick="location.href='/admin'" style="display:none">⚙ Admin</button>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero-wrap" id="heroWrap">
    <div class="hero-content">
      <h1 class="hero-title" id="heroTitle">How can we help you<span>?</span></h1>
      <p class="hero-sub" id="heroSub">Search the RawTalent knowledge base for answers, guides, and resources</p>

      <div class="mode-tabs">
        <button class="mode-tab active" id="tabSearch" onclick="setMode('search')">🔍 Search Articles</button>
        <button class="mode-tab" id="tabAI" onclick="setMode('ai')">✨ Ask AI</button>
      </div>

      <div id="searchArea" class="hero-search-wrap">
        <input type="text" id="searchInput" class="hero-input"
          placeholder="Search articles, topics, or keywords…"
          autocomplete="off" autofocus>
        <span class="hero-input-icon">⌕</span>
      </div>

      <div id="aiArea" style="display:none" class="hero-ask-row">
        <div style="flex:1;position:relative">
          <input type="text" id="aiInput" class="hero-input"
            placeholder="e.g. What are Victoria's childcare compliance requirements?"
            autocomplete="off">
          <span class="hero-input-icon">✨</span>
        </div>
        <button class="hero-ask-btn" id="aiBtn" onclick="askAI()">Ask AI</button>
      </div>
    </div>

    <div class="ai-mode-banner" id="aiBanner">
      ✨ AI answers are generated from your knowledge base — documents, articles, and reference websites
    </div>

    <!-- Stats strip inside hero -->
    <div class="stats-strip" id="statsStrip">
      <div class="stat-pill"><strong id="statArticles">—</strong> Articles</div>
      <div class="stat-pill"><strong id="statCats">—</strong> Categories</div>
      <div class="stat-pill"><strong id="statSources">—</strong> AI Sources</div>
    </div>
  </div>

  <!-- Category bar -->
  <div class="cat-bar" id="catBar" style="display:none">
    <button class="cat-pill active" data-cat="" onclick="selectCat('', this)">All Topics</button>
  </div>

  <!-- Results -->
  <div class="results-wrap">
    <div id="resultsLabel" class="results-label" style="display:none"></div>
    <div id="resultsList">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    let currentMode = 'search';
    let currentCat = '';
    let searchTimer;

    async function init() {
      try {
        const me = await fetch('/auth/me').then(r => r.json());
        if (me.error) { location.href = '/login.html'; return; }
        document.getElementById('navAvatar').textContent = (me.name || me.email)[0].toUpperCase();
        const nameEl = document.getElementById('navName');
        nameEl.textContent = me.name || me.email.split('@')[0];
        nameEl.style.display = '';
        if (me.role === 'admin' || me.role === 'super_admin') {
          const btn = document.getElementById('adminNavBtn');
          btn.style.display = 'inline-flex';
          btn.textContent = me.role === 'super_admin' ? '⚙ Super Admin' : '⚙ Admin';
        }
      } catch { location.href = '/login.html'; return; }

      loadStats();
      loadCategories();
      loadResults();
    }

    async function loadStats() {
      try {
        const [cats, sources] = await Promise.all([
          fetch('/api/articles/categories').then(r => r.json()),
          fetch('/api/sources').then(r => r.json()).catch(() => [])
        ]);
        const totalCats = cats.length;
        const totalArticles = cats.reduce((s, c) => s + Number(c.count), 0);
        document.getElementById('statArticles').textContent = totalArticles;
        document.getElementById('statCats').textContent = totalCats;
        document.getElementById('statSources').textContent = Array.isArray(sources) ? sources.length : '—';
      } catch {}
    }

    // ── Mode ──────────────────────────────────────────────────────
    function setMode(mode) {
      currentMode = mode;
      const isAI = mode === 'ai';
      document.getElementById('tabSearch').classList.toggle('active', !isAI);
      document.getElementById('tabAI').classList.toggle('active', isAI);
      document.getElementById('searchArea').style.display = isAI ? 'none' : '';
      document.getElementById('aiArea').style.display = isAI ? '' : 'none';
      document.getElementById('catBar').style.display = isAI ? 'none' : '';
      document.getElementById('aiBanner').classList.toggle('show', isAI);
      document.getElementById('heroTitle').textContent = isAI ? 'Ask the AI anything' + String.fromCharCode(8203) : 'How can we help you?';
      document.getElementById('heroSub').textContent = isAI
        ? 'Powered by Claude AI — searches across all articles, documents, and reference sites'
        : 'Search the RawTalent knowledge base for answers, guides, and resources';
      document.getElementById('resultsLabel').style.display = 'none';
      if (isAI) {
        document.getElementById('resultsList').innerHTML = `
          <div class="empty-wrap">
            <div class="empty-icon">✨</div>
            <div class="empty-title">Ask any work-related question</div>
            <p style="font-size:14px;margin-top:4px">Try: "What are the WWCC requirements for Victoria?" or "How do I handle a no-show?"</p>
          </div>`;
        setTimeout(() => document.getElementById('aiInput').focus(), 50);
      } else {
        loadResults();
        setTimeout(() => document.getElementById('searchInput').focus(), 50);
      }
    }

    // ── Ask AI ────────────────────────────────────────────────────
    async function askAI() {
      const q = document.getElementById('aiInput').value.trim();
      if (!q) return;
      const btn = document.getElementById('aiBtn');
      const list = document.getElementById('resultsList');
      btn.disabled = true;
      btn.textContent = 'Thinking…';
      list.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div></div>`;
      try {
        const res = await fetch('/api/sources/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        renderAIAnswer(data.answer, data.sources || []);
      } catch (err) {
        list.innerHTML = `<div class="empty-wrap"><div class="empty-icon">⚠️</div><div class="empty-title">Something went wrong</div><p>${escHtml(err.message)}</p></div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ask AI';
      }
    }

    function renderAIAnswer(answer, sources) {
      // Build href lookup keyed by 1-based source number
      const sourceHrefs = {};
      sources.forEach((s, i) => {
        sourceHrefs[i + 1] = s.type === 'article' ? `/article?id=${s.id}` : (s.origin || '#');
      });

      function processAnswer(text) {
        // Escape HTML
        let html = text
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        // Bold: **text**
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // Inline [Source N] → linked superscript badge
        html = html.replace(/\[Source (\d+)\]/g, (match, n) => {
          const num = parseInt(n);
          const s = sources[num - 1];
          if (!s) return match;
          const href = sourceHrefs[num];
          const target = s.type !== 'article' ? 'target="_blank" rel="noopener"' : '';
          return `<a class="source-ref" href="${href.replace(/"/g,'&quot;')}" ${target} title="${escHtml(s.title)}">${num}</a>`;
        });
        // Paragraphs: split on double newline
        const paras = html.split(/\n{2,}/);
        if (paras.length > 1) {
          return paras.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
        }
        // Single-paragraph: convert single newlines to <br>
        return `<p>${html.replace(/\n/g, '<br>')}</p>`;
      }

      const chips = sources.length ? `
        <div class="ai-sources-label">Sources used</div>
        <div>${sources.map((s, i) => {
          const icon = s.type === 'website' ? '🌐' : s.type === 'document' ? '📄' : '📋';
          const href = sourceHrefs[i + 1];
          const ext = s.type !== 'article' ? 'target="_blank" rel="noopener"' : '';
          return `<a class="ai-source-tag" href="${escHtml(href)}" ${ext}><span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:var(--orange);color:white;border-radius:50%;font-size:9px;font-weight:700;flex-shrink:0">${i+1}</span>${icon} ${escHtml(s.title)}</a>`;
        }).join('')}</div>` : '';

      document.getElementById('resultsList').innerHTML = `
        <div class="ai-answer-wrap">
          <div class="ai-answer-header">✨ AI Answer</div>
          <div class="ai-answer-body">
            <div class="ai-answer-text">${processAnswer(answer)}</div>
            ${chips}
            <div class="ai-disclaimer">⚠ AI answers are generated from your knowledge base. Always verify compliance or regulatory information with official sources before acting on it.</div>
          </div>
        </div>
        <div style="text-align:center;margin-top:6px">
          <button onclick="setMode('search')" style="background:none;border:none;color:var(--orange);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">← Browse all articles instead</button>
        </div>`;
    }

    // ── Search ────────────────────────────────────────────────────
    async function loadCategories() {
      try {
        const cats = await fetch('/api/articles/categories').then(r => r.json());
        const bar = document.getElementById('catBar');
        bar.style.display = '';
        cats.forEach(c => {
          const btn = document.createElement('button');
          btn.className = 'cat-pill';
          btn.dataset.cat = c.category;
          btn.textContent = `${c.category} (${c.count})`;
          btn.onclick = () => selectCat(c.category, btn);
          bar.appendChild(btn);
        });
      } catch {}
    }

    function selectCat(cat, el) {
      currentCat = cat;
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      loadResults();
    }

    async function loadResults() {
      const q = document.getElementById('searchInput').value.trim();
      const label = document.getElementById('resultsLabel');
      const list = document.getElementById('resultsList');
      list.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div></div>`;
      label.style.display = 'none';
      try {
        const params = new URLSearchParams({ limit: 50 });
        if (q) params.set('q', q);
        if (currentCat) params.set('category', currentCat);
        const data = await fetch(`/api/articles/search?${params}`).then(r => r.json());
        if (data.error) { location.href = '/login.html'; return; }
        if (!data.length) {
          list.innerHTML = `<div class="empty-wrap">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">${q ? `No results for "${escHtml(q)}"` : 'No articles yet'}</div>
            <p style="font-size:14px;margin-top:4px">${q ? `Try different keywords — or <button onclick="setMode('ai')" style="background:none;border:none;color:var(--orange);font-weight:600;cursor:pointer;font-family:inherit;font-size:inherit;padding:0">ask the AI ✨</button>` : 'Check back soon — content is being added.'}</p>
          </div>`;
          return;
        }
        if (q) {
          label.style.display = '';
          label.innerHTML = `<strong>${data.length}</strong> result${data.length !== 1 ? 's' : ''} for "<strong>${escHtml(q)}</strong>"`;
        }
        list.innerHTML = `<div class="results-grid">${data.map(a => `
          <a class="article-card" href="/article?id=${a.id}">
            ${a.category ? `<div class="card-cat">${escHtml(a.category)}</div>` : ''}
            <div class="card-title">${escHtml(a.title)}</div>
            ${a.summary ? `<div class="card-summary">${escHtml(a.summary)}</div>` : ''}
            <div class="card-footer">
              <div class="card-tags">${(a.tags || []).slice(0, 3).map(t => `<span class="card-tag">${escHtml(t)}</span>`).join('')}</div>
              <span class="card-date">${fmtDate(a.updated_at)}</span>
            </div>
          </a>`).join('')}</div>`;
      } catch {
        list.innerHTML = `<div class="empty-wrap"><div class="empty-icon">⚠️</div><div class="empty-title">Something went wrong</div><p>Please refresh and try again.</p></div>`;
      }
    }

    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadResults, 280);
    });
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') { clearTimeout(searchTimer); loadResults(); }
    });
    document.getElementById('aiInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') askAI();
    });

    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      location.href = '/login.html';
    }
    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtDate(iso) {
      if (!iso) return '';
      try { return new Date(iso).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }); }
      catch { return ''; }
    }

    init();
  </script>
</body>
</html>
