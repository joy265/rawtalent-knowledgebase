<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — RawTalent Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,.25);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-bg"></div>
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-name">Raw<span>Talent</span></div>
        <div class="login-logo-sub">Knowledge Base</div>
      </div>

      <div id="loginError" class="login-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-input"
            placeholder="you@rawtalent.com.au" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position:relative">
            <input type="password" id="password" name="password" class="form-input"
              placeholder="••••••••" autocomplete="current-password" required style="padding-right:44px">
            <button type="button" id="togglePw" onclick="togglePassword()"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:rgba(255,255,255,.4);font-size:18px;line-height:1;transition:color 0.2s"
              onmouseover="this.style.color='rgba(255,255,255,.8)'" onmouseout="this.style.color='rgba(255,255,255,.4)'">
              👁
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
      </form>

      <div id="googleSection" style="display:none">
        <div class="login-divider"><span>or</span></div>
        <a href="/auth/google" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </a>
      </div>

      <div class="login-footer">
        Access restricted to RawTalent team members
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('togglePw');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    // Show error from URL param
    const params = new URLSearchParams(location.search);
    if (params.get('error')) {
      const el = document.getElementById('loginError');
      el.textContent = 'Google sign-in failed. Please try again or use email/password.';
      el.classList.add('show');
    }

    // Check if Google OAuth is available
    fetch('/auth/me').then(r => {
      if (r.ok) location.href = '/';
    });

    // Show Google button if configured
    fetch('/api/articles/categories').then(r => {
      if (r.status === 401) {
        // Check if Google is available by trying the endpoint
        fetch('/auth/google', { method: 'HEAD', redirect: 'manual' }).then(r2 => {
          if (r2.type === 'opaqueredirect' || r2.status === 302) {
            document.getElementById('googleSection').style.display = 'block';
          }
        }).catch(() => {});
      }
    }).catch(() => {});

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('loginError');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      errEl.classList.remove('show');

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          location.href = '/';
        } else {
          errEl.textContent = data.error || 'Sign in failed.';
          errEl.classList.add('show');
        }
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.add('show');
      } finally {
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
